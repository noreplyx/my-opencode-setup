rules:
  - id: no-hardcoded-passwords
    pattern: |
      password = "..."
    message: >-
      Hardcoded password detected. Use environment variables or a secret manager instead.
    languages:
      - python
    severity: ERROR
    metadata:
      category: security
      technology:
        - python

  - id: no-print-statements
    pattern: print(...)
    message: >-
      Avoid using print statements in production code. Use a proper logging framework.
    languages:
      - python
    severity: WARNING
    metadata:
      category: best-practice
      technology:
        - python

  - id: no-eval-usage
    pattern: eval(...)
    message: >-
      Avoid using eval() as it can lead to code injection vulnerabilities.
    languages:
      - python
    severity: ERROR
    metadata:
      category: security
      technology:
        - python
